maxIterations = 0
iterationDelay = 3000
outputDir = ".ralph-tui/iterations"
autoCommit = false
agent = "claude"
tracker = "json"
progressFile = ".ralph-tui/progress.md"
configVersion = "2.1"

[agentOptions]
model = "claude-opus-4-6"
dangerouslySkipPermissions = true

[trackerOptions]
path = "./prd.json"

[errorHandling]
strategy = "retry"
maxRetries = 5
retryDelayMs = 15000

[rateLimitHandling]
enabled = true
maxRetries = 5
baseBackoffMs = 15000

[notifications]
enabled = true
sound = "off"

[parallel]
mode = "never"
